<?plantuml 1.2026.2?><svg contentStyleType='text/css' data-diagram-type='ACTIVITY' height='741px' preserveAspectRatio='none' style='width:430px;height:741px;background:#FEFEFE;' version='1.1' viewBox='0 0 430 741' width='430px' xmlns:xlink='http://www.w3.org/1999/xlink' xmlns='http://www.w3.org/2000/svg' zoomAndPan='magnify'><title>Proc&#233;dure d'Audit du Contexte Agent &#8212; 5 &#201;tapes</title><defs/><g><rect fill='#FEFEFE' height='741' style='stroke:none;stroke-width:1;' width='430' x='0' y='0'/><g class='title' data-source-line='4'><text fill='#000000' font-family='sans-serif' font-size='14' font-weight='bold' lengthAdjust='spacing' textLength='387.2627' x='20' y='32.9951'>Proc&#233;dure d'Audit du Contexte Agent &#8212; 5 &#201;tapes</text></g><ellipse cx='228.3032' cy='57.2969' fill='#222222' rx='10' ry='10' style='stroke:#222222;stroke-width:1;'/><rect fill='#F1F1F1' height='47.9375' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='193.7422' x='131.4321' y='87.2969'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='11.4492' x='192.8013' y='108.4355'>1.</text><text fill='#000000' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='55.7402' x='208.0649' y='108.4355'>Mesurer</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='173.7422' x='141.4321' y='122.4043'>`wc -l *.adoc .agents/*.adoc`</text><polygon fill='#F1F1F1' points='169.7234,155.2344,286.8831,155.2344,298.8831,167.2344,286.8831,179.2344,169.7234,179.2344,157.7234,167.2344,169.7234,155.2344' style='stroke:#181818;stroke-width:0.5;'/><text fill='#000000' font-family='sans-serif' font-size='11' lengthAdjust='spacing' textLength='117.1597' x='169.7234' y='171.0425'>Total &gt; 1000 lignes ?</text><text fill='#000000' font-family='sans-serif' font-size='11' lengthAdjust='spacing' textLength='16.7578' x='140.9656' y='164.6401'>oui</text><text fill='#000000' font-family='sans-serif' font-size='11' lengthAdjust='spacing' textLength='20.6733' x='298.8831' y='164.6401'>non</text><rect fill='#F1F1F1' height='33.9688' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='152.2344' x='71.6062' y='189.2344'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='132.2344' x='81.6062' y='210.373'>&#9888;&#65039; Contexte trop lourd</text><rect fill='#F1F1F1' height='33.9688' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='99.5469' x='259.1096' y='189.2344'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='79.5469' x='269.1096' y='210.373'>&#9989; Contexte OK</text><ellipse cx='308.8831' cy='254.2031' fill='none' rx='11' ry='11' style='stroke:#222222;stroke-width:1;'/><ellipse cx='308.8831' cy='254.2031' fill='#222222' rx='6' ry='6' style='stroke:#222222;stroke-width:1;'/><rect fill='#F1F1F1' height='47.9375' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='171.2539' x='142.6763' y='285.2031'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='11.4492' x='152.6763' y='306.3418'>2.</text><text fill='#000000' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='135.9902' x='167.9399' y='306.3418'>Identifier le suspect</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='149.9414' x='153.3325' y='320.3105'>Le fichier &gt; 20% du total</text><rect fill='#F1F1F1' height='89.8438' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='218.9082' x='118.8491' y='353.1406'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='11.4492' x='128.9077' y='374.2793'>3.</text><text fill='#000000' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='183.5273' x='144.1714' y='374.2793'>Auditer section par section</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='129.9844' x='163.311' y='388.248'>Pour chaque section :</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='161.877' x='147.3647' y='402.2168'>&#8226; D&#233;j&#224; ailleurs ? &#8594; doublon</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='139.7695' x='158.4185' y='416.1855'>&#8226; Jamais servi ? &#8594; mort</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='198.9082' x='128.8491' y='430.1543'>&#8226; Information unique ? &#8594; critique</text><rect fill='#F1F1F1' height='75.875' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='220.5313' x='118.0376' y='462.9844'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='11.4492' x='189.2681' y='484.123'>4.</text><text fill='#000000' font-family='sans-serif' font-size='12' font-weight='bold' lengthAdjust='spacing' textLength='62.8066' x='204.5317' y='484.123'>Classifier</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='196.8809' x='129.8628' y='498.0918'>&#128993; Doublons &#8594; &#224; retirer de l'EAGER</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='175.0723' x='140.7671' y='512.0605'>&#128308; Jamais utilis&#233; &#8594; cold storage</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='200.5313' x='128.0376' y='526.0293'>&#128994; Connaissance unique &#8594; &#224; garder</text><rect fill='#F1F1F1' height='61.9063' rx='12.5' ry='12.5' style='stroke:#181818;stroke-width:0.5;' width='236.9199' x='109.8433' y='558.8594'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' te