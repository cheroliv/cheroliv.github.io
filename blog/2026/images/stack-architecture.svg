5'>CLI de vibe coding</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='123.8613' x='287' y='128.4043'>Open source, gratuit</text></g><g class='entity' data-qualified-name='OC.GMN5' data-source-line='13' id='ent0006'><path d='M572,79.2969 L572,110.0702 L421.277,116.2609 L572,118.0702 L572,145.1719 A0,0 0 0 0 572,145.1719 L818.4512,145.1719 A0,0 0 0 0 818.4512,145.1719 L818.4512,89.2969 L808.4512,79.2969 L572,79.2969 A0,0 0 0 0 572,79.2969' fill='#FEFFDD' style='stroke:#181818;stroke-width:0.5;'/><path d='M808.4512,79.2969 L808.4512,89.2969 L818.4512,89.2969 L808.4512,79.2969' fill='#FEFFDD' style='stroke:#181818;stroke-width:0.5;'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='139.5996' x='578' y='95.4355'>C'est l'outil que j'utilise</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='186.6094' x='578' y='109.4043'>pour coder avec des agents IA.</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='168.5625' x='578' y='123.373'>Il ne fournit AUCUN mod&#232;le.</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='225.4512' x='578' y='137.3418'>C'est un terminal + un orchestrateur.</text></g><g class='entity' data-qualified-name='OL.Client' data-source-line='21' id='ent0009'><rect fill='#F1F1F1' height='47.9375' rx='2.5' ry='2.5' style='stroke:#181818;stroke-width:0.5;' width='164.3516' x='613' y='234.2969'/><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='105.9199' x='623' y='255.4355'>Client d'inf&#233;rence</text><text fill='#000000' font-family='sans-serif' font-size='12' lengthAdjust='spacing' textLength='144.3516' x='623' y='269.4043'>Install&#233; sur ma machine</text></g><g class='entity' data-qualified-name='OL.GMN10' data-source-line='23' id='ent0011'><path d='M969,20